<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issue Tracker</title>
<!-- daisyui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts  -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- CSS linked  -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- login form -->
    <section class="w-11/12 mx-auto grid place-items-center min-h-screen">
<fieldset class="fieldset border-base-300 rounded-box w-xs border shadow-xl p-4">
  <div class="mx-auto text-center py-5">
        <div class="mx-auto pb-5 flex justify-center">
            <img src="assets/github-logo.png" alt="">
        </div>
        <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
        <p class="">Sign in to manage your issues</p>
  </div>
  <label class="label font-semibold">Username</label>
  <input id="username" type="text" class="input font-semibold" placeholder="Enter Username" />
  <p class="text-purple-600">Default: admin</p>

  <label class="label font-semibold">Password</label>
  <input id="password" type="password" class="input font-semibold" placeholder="Enter Password" />
  <p class="text-purple-600 ">Default: admin123</p>

  <button onclick="signInBtn()" class="btn  btn-primary rounded-lg mt-4">Sign In</button>
  

  <div class="pt-10 text-center space-y-5">

    <div class="flex items-center">
        <div class="flex-grow border-t"></div>
        <span class="mx-4">OR</span>
        <div class="flex-grow border-t"></div>
    </div>

    <p class="text-gray-600">Demo Credentials </p>
    <div class="bg-gray-100 p-4">
        <p ><span class="font-bold">Username :</span>admin</p>
        <p><span class="font-bold">Password :</span>admin123</p>
    </div>
    </div>
</fieldset>
    </section>
    <script src="script/signIn.js"></script>
</body>
</html>
