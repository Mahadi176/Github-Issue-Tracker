<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | GitHub Issue Tracker</title>
<!-- daisyui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts  -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- CSS linked  -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
   <header>
     <div class="p-5 md:flex  items-center bg-base-100 shadow-sm space-y-4">
        <div class="md:flex flex-1 items-center gap-3 ">
            <div class="w-9 flex justify-center">
                <img src="assets/github-logo.png" alt="">
            </div>
            <h1 class="text-2xl font-bold">GitHub Issue Tracker</h1>
        </div>
        <div class="flex justify-center gap-2">
            <input id="inputSearch" type="text" placeholder="Search Issues" class="input input-bordered md:w-auto" />
            <button id="btnSearch" class="btn btn-primary">Search</button>
        </div>
</div>
</header>
<!-- Main-Section  -->
 <main class="mx-auto w-11/12">
    <!-- Button Section  -->
    <section class="p-5  shadow-md space-x-3 my-10 ">
        <button onclick="filterIssues('all')" id="btnAll" class="btn btn-soft btn-primary">All</button>
        <button onclick="filterIssues('open')" id="btnOpen" class="btn btn-soft btn-primary">Open</button>
        <button onclick="filterIssues('closed')" id="btnClose" class="btn btn-soft btn-primary">Close</button>
    </section>
    <!-- Issue section  -->
    <section class="md:flex items-center justify-between p-5  shadow-md space-x-3 space-y-2">
        <div class="flex items-center space-x-2">
            <div class="bg-gray-200 p-2 rounded-full ">
                <img src="assets/Aperture.png" alt="">
            </div>
            <div>
                <h1 class="text-lg font-bold"><span id="issueCount"></span> Issues</h1>
                <p>Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 justify-center">
           <div class="flex justify-center items-center gap-2">
            <div class="w-5"><img src="assets/Open-Status.png" alt=""></div>
            <p>Open</p>
            </div>
           <div class="flex justify-center items-center gap-2">
            <div class="w-5"><img src="assets/Closed-Stat.png" alt=""></div>
            <p>Close</p>
            </div>
        </div>
    </section>
    <section>
        <div id="issueSection" class="grid md:grid-cols-3 gap-y-5 gap-x-10  my-5" >

        </div>
        <div id="loadSpin" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-bars loading-xl"></span>
        </div>
    </section>
 </main>


<dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
   <div id="details-container">

   </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>

    <script src="script/home.js"></script>
</body>
</html>
